[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Custom domain configuration
# Primary domain: watamu.exploreans.com
# Netlify subdomain: exploreanswatamu.netlify.app
# Both will redirect to https://watamu.exploreans.com

# Sveltia CMS uses Netlify Identity + git-gateway by default
# Once deployed, enable Identity in the Netlify dashboard, then enable git-gateway
# under Identity → Services → Git Gateway

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Sitemap and robots.txt must be served as static files
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Pretty URL fallback for Astro
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
